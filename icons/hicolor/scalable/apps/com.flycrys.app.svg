<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8e6ff"/>
      <stop offset="50%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="wing-l" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#e1bee7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="wing-r" x1="1" y1="0" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#e1bee7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ce93d8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left wing -->
  <path d="M58 52 C40 30, 8 18, 4 38 C0 58, 24 62, 52 62 Z"
        fill="url(#wing-l)" stroke="#b39ddb" stroke-width="1.2"/>
  <path d="M54 58 C36 48, 14 40, 10 42 C18 44, 36 52, 52 62"
        fill="none" stroke="#b39ddb" stroke-width="0.7" opacity="0.6"/>
  <path d="M56 54 C42 36, 18 26, 8 36 C16 34, 38 42, 54 56"
        fill="none" stroke="#b39ddb" stroke-width="0.7" opacity="0.6"/>

  <!-- Right wing -->
  <path d="M70 52 C88 30, 120 18, 124 38 C128 58, 104 62, 76 62 Z"
        fill="url(#wing-r)" stroke="#b39ddb" stroke-width="1.2"/>
  <path d="M74 58 C92 48, 114 40, 118 42 C110 44, 92 52, 76 62"
        fill="none" stroke="#b39ddb" stroke-width="0.7" opacity="0.6"/>
  <path d="M72 54 C86 36, 110 26, 120 36 C112 34, 90 42, 74 56"
        fill="none" stroke="#b39ddb" stroke-width="0.7" opacity="0.6"/>

  <!-- Crystal body -->
  <polygon points="64,24 80,56 74,100 64,108 54,100 48,56"
           fill="url(#crystal)" stroke="#0d47a1" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Crystal facets -->
  <polygon points="64,24 72,50 64,56 56,50"
           fill="url(#shine)" stroke="#0d47a1" stroke-width="0.5" opacity="0.6"/>
  <line x1="64" y1="56" x2="64" y2="108"
        stroke="#0d47a1" stroke-width="0.7" opacity="0.4"/>
  <line x1="56" y1="50" x2="54" y2="100"
        stroke="#0d47a1" stroke-width="0.5" opacity="0.3"/>
  <line x1="72" y1="50" x2="74" y2="100"
        stroke="#0d47a1" stroke-width="0.5" opacity="0.3"/>

  <!-- Highlight -->
  <polygon points="60,30 64,24 66,34 62,42"
           fill="white" opacity="0.5"/>

  <!-- Small sparkles -->
  <circle cx="42" cy="42" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="88" cy="44" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="64" cy="18" r="1.8" fill="white" opacity="0.9"/>
</svg>
